services:

  postgres:
    image: postgres:16
    container_name: studyflow_postgres
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: studyflow_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  mongodb:
    image: mongo:7
    container_name: studyflow_mongodb
    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db


volumes:
  postgres_data:
  mongodb_data: